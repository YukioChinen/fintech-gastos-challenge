services:
  - type: web
    name: fintech-gastos-challenge
    env: php
    plan: starter
    rootDir: .
    buildCommand: |
      composer install --no-dev --prefer-dist --optimize-autoloader
      cd frontend
      npm ci
      npm run build
      rm -rf ../public/assets
      cp -R dist/assets ../public/assets
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Fintech Gastos Challenge
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://fintech-gastos-challenge.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: fintech-gastos-db
          property: connectionString
      - key: MAIL_MAILER
        value: log

databases:
  - name: fintech-gastos-db
    databaseName: fintech_gastos
    user: fintech_gastos